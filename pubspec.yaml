name: echofit
description: "EchoFit: A multi-platform health metric tracker (Android & Windows) featuring voice-driven data entry and secure Nextcloud synchronization."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2+1
  path: ^1.9.1
  dio: ^5.9.2
  path_provider: ^2.1.5
  intl: ^0.20.2
  json_annotation: ^4.12.0
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.3
  fl_chart: ^1.2.0
  flutter_riverpod: 2.5.1
  flutter_displaymode: ^0.7.0
  shared_preferences: ^2.5.5
  sqflite_common_ffi: ^2.4.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.14.0
  build_runner: ^2.15.0
  mockito: ^5.6.4
  build_test: ^3.5.15

flutter:
  uses-material-design: true
